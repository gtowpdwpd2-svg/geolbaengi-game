<!DOCTYPE html>
<html lang="ko">
<head>

<title>걸뱅이 게임 - 개똥 다리건너기</title>
<script>
/* ===================== 카카오톡 인앱 브라우저 대응 =====================
   카카오톡 자체 브라우저는 Firestore 같은 실시간 연결에 제약이 있어 랭킹 기능이
   먹통이 되는 경우가 있습니다. 감지되면 안드로이드는 자동으로 외부 브라우저(크롬)로
   튕겨내고, iOS는 애플 정책상 자동 리다이렉트가 막혀있어 안내 배너로 유도합니다.
   반드시 다른 스크립트보다 먼저 실행되어야 하므로 <head> 맨 위에 둡니다. */
(function() {
  var ua = navigator.userAgent || '';
  var isKakaoInApp = /KAKAOTALK/i.test(ua);
  if (!isKakaoInApp) return;

  var isAndroid = /Android/i.test(ua);
  if (isAndroid) {
    var target = location.href.replace(/^https?:\/\//i, '');
    location.href = 'intent://' + target + '#Intent;scheme=https;package=com.android.chrome;end';
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ffe66d;color:#222;' +
        'padding:12px 16px;text-align:center;font-size:14px;z-index:99999;line-height:1.5;' +
        'font-family:-apple-system,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
      banner.innerHTML = '⚠️ 카카오톡 브라우저에서는 랭킹 기능이 제한됩니다.<br>' +
        '우측 상단 <b>"···"</b> 메뉴 → <b>"다른 브라우저로 열기"</b>를 눌러주세요.';
      document.body.appendChild(banner);
    });
  }
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

<style>

    background: #0d0d1a;

  .lb-panel input {

  #lb-submit-btn { background: #4ecdc4; color: #003333; }

  #lb-status { min-height: 18px; font-size: 12px; color: #ffe66d; margin-top: 6px; }

  <button id="bgm-toggle" title="배경음악 켜기/끄기">🔊</button>
  <div id="leaderboard-overlay" class="lb-overlay hidden">
    <div class="lb-panel">

        <button id="lb-stats-close-btn">닫기</button>
      </div>
    </div>
  </div>
</div>
<script>

/* ===================== Firebase 초기화 ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyC0_uGNgi7q8lJriEVU77CbQW2n1SPoaJY",
  authDomain: "beggargame-57ac2.firebaseapp.com",
  projectId: "beggargame-57ac2",
  storageBucket: "beggargame-57ac2.firebasestorage.app",
  messagingSenderId: "1037587961266",
  appId: "1:1037587961266:web:da117bc4f387fea3ae00ab",
  measurementId: "G-3HGV8G6TQQ"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
// 일부 모바일 통신사 네트워크/브라우저에서 Firestore의 기본 스트리밍 연결(WebChannel)이
// 응답 없이 계속 대기하는 문제가 있어, 더 안정적인 long-polling 방식으로 강제 전환합니다.
db.settings({
  experimentalForceLongPolling: true, // 자동감지가 실패하는 경우가 있어, 감지 없이 무조건 강제 적용
  useFetchStreams: false
});
db.enableNetwork().catch((err) => console.warn('Firestore 네트워크 활성화 실패:', err.message));
let currentUid = null;

auth.signInAnonymously().catch((err) => {
  console.error('익명 로그인 실패:', err);
});
auth.onAuthStateChanged((user) => {
  if (user) currentUid = user.uid;
});

/* ===================== 랭킹판 로직 =====================
   구조: 게임별로 별도 컬렉션(scores, scores_signal 등) 사용, 문서 ID = 유저의 익명 uid.
   -> 유저 1명당 게임별 기록 1개만 존재하고, 더 빠른 기록일 때만 갱신 가능.
   -> 이 구조 자체가 "같은 계정으로 점수 도배"를 원천 차단합니다.
   새 게임을 추가할 때마다 Firestore 콘솔 > 규칙 탭에 아래 패턴을 그대로 복사해서
   컬렉션 이름만 바꿔 추가해주세요 (기존 규칙 블록들 사이에 이어붙이면 됩니다):

   match /{collectionName}/{uid} {
     allow read: if true;
     allow create: if request.auth != null
                   && request.auth.uid == uid
                   && request.resource.data.time is number
                   && request.resource.data.time >= 3
                   && request.resource.data.time <= 300
                   && request.resource.data.nickname is string
                   && request.resource.data.nickname.size() > 0
                   && request.resource.data.nickname.size() <= 10;
     allow update: if request.auth != null
                   && request.auth.uid == uid
                   && request.resource.data.time is number
                   && request.resource.data.time >= 3
                   && request.resource.data.time <= 300
                   && request.resource.data.time < resource.data.time
                   && request.resource.data.nickname is string
                   && request.resource.data.nickname.size() > 0
                   && request.resource.data.nickname.size() <= 10;
     allow delete: if false;
   }

   (collectionName 자리에 실제로는 scores, scores_signal 처럼 구체적인 이름을 넣어야 합니다.
    Firestore 규칙은 컬렉션 이름에 와일드카드를 쓸 수 없어서, 게임이 늘어날 때마다
    이 블록을 통째로 복사해서 컬렉션 이름만 바꿔 추가해주시면 됩니다.)
*/

// 게임별 표시 이름 (랭킹판 제목에 사용)
const LEADERBOARD_LABELS = {
  scores: '🌉 개똥 다리건너기',
  scores_signal: '🚦 눈치 신호등 게임',
  scores_table: '🍚 밥상 눈치싸움'
};

// 현재 열려있는 랭킹판이 어떤 게임 것인지 기억 (건너뛰기/닫기 버튼에서 참조)
let activeLeaderboardCollection = 'scores';

// 닉네임 형식 검증 (한글/영문/숫자만 허용, 1~10자)
// 참고: 이건 형식 검증일 뿐 비속어 필터는 아닙니다.
// 실제 서비스 단계에서는 별도의 비속어 필터 라이브러리나 서버 검수를 추가하는 걸 권장합니다.
const NICKNAME_PATTERN = /^[가-힣a-zA-Z0-9\s]{1,10}$/;
function isValidNickname(name) {
  return NICKNAME_PATTERN.test(name.trim());
}

async function showSubmitView(finalTime, collectionName = 'scores') {
  activeLeaderboardCollection = collectionName;
  const label = LEADERBOARD_LABELS[collectionName] || collectionName;
  document.getElementById('lb-time-display').textContent = `[${label}] 이번 기록: ${finalTime}초`;
  document.getElementById('lb-submit-view').classList.remove('hidden');
  document.getElementById('lb-rank-view').classList.add('hidden');
  document.getElementById('lb-stats-view').classList.add('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');
  document.getElementById('lb-status').textContent = '내 최고기록 확인 중...';
  document.getElementById('lb-nickname').value = '';
  document.getElementById('lb-submit-btn').onclick = () => submitScore(finalTime, collectionName);
  document.getElementById('lb-nickname').focus();

  // 왜 등록이 막히는지 미리 알 수 있도록, 내 기존 최고기록을 먼저 보여줍니다.
  try {
    if (currentUid) {
      const doc = await withTimeout(db.collection(collectionName).doc(currentUid).get({ source: 'server' }), 8000, '네트워크 응답이 너무 느립니다.');
      const existingTime = (doc.exists && typeof doc.data().time === 'number' && !isNaN(doc.data().time))
        ? doc.data().time
        : null;
      if (existingTime !== null) {
        document.getElementById('lb-status').textContent =
          finalTime < existingTime
            ? `내 기존 최고기록: ${existingTime}초 → 이번 기록이 더 빠릅니다! 등록하세요.`
            : `내 기존 최고기록: ${existingTime}초 (이번 기록보다 빠름 - 등록해도 갱신되지 않습니다)`;
      } else {
        document.getElementById('lb-status').textContent = '첫 기록입니다. 등록해보세요!';
      }
    }
  } catch (err) {
    console.warn('최고기록 조회 실패:', err.message);
    document.getElementById('lb-status').textContent = '네트워크가 느려 확인 못했지만, 등록 시도는 가능합니다.';
  }
}

function showRankOnlyView(collectionName = activeLeaderboardCollection) {
  activeLeaderboardCollection = collectionName;
  const label = LEADERBOARD_LABELS[collectionName] || collectionName;
  document.getElementById('lb-rank-title').textContent = `🏆 ${label} TOP 10`;
  document.getElementById('lb-submit-view').classList.add('hidden');
  document.getElementById('lb-rank-view').classList.remove('hidden');
  document.getElementById('lb-stats-view').classList.add('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');
  loadLeaderboard(collectionName);
}

// 운영자용 플레이 데이터 확인 화면 (설문 없이 서버 로그로 확인)
async function showStatsView() {
  document.getElementById('lb-submit-view').classList.add('hidden');
  document.getElementById('lb-rank-view').classList.add('hidden');
  document.getElementById('lb-stats-view').classList.remove('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');

  const content = document.getElementById('lb-stats-content');
  content.textContent = '불러오는 중...';

  try {
    const [bridgeFunnelDoc, bridgeDeathsDoc, signalFunnelDoc, signalDeathsDoc, tableFunnelDoc, tableDeathsDoc] = await withTimeout(
      Promise.all([
        db.collection('analytics').doc('funnel').get({ source: 'server' }),
        db.collection('analytics').doc('stage_deaths').get({ source: 'server' }),
        db.collection('analytics').doc('funnel_signal').get({ source: 'server' }),
        db.collection('analytics').doc('signal_deaths').get({ source: 'server' }),
        db.collection('analytics').doc('funnel_table').get({ source: 'server' }),
        db.collection('analytics').doc('table_deaths').get({ source: 'server' })
      ]),
      8000,
      '네트워크 응답이 너무 느립니다.'
    );

    let html = '';

    // 🌉 다리건너기 통계
    const bFunnel = bridgeFunnelDoc.exists ? bridgeFunnelDoc.data() : {};
    const bDeaths = bridgeDeathsDoc.exists ? bridgeDeathsDoc.data() : {};
    const bStarts = bFunnel.gameStarts || 0;
    const bClears = bFunnel.gameClears || 0;
    const bRate = bStarts > 0 ? ((bClears / bStarts) * 100).toFixed(1) : '0.0';

    html += `<p style="color:#ffe66d;"><b>🌉 개똥 다리건너기</b></p>`;
    html += `<p>시작 ${bStarts}회 / 클리어 ${bClears}회 (${bRate}%)</p>`;
    let bMax = 0;
    for (let i = 0; i < STAGE_COUNT; i++) bMax = Math.max(bMax, bDeaths[`stage_${i}`] || 0);
    for (let i = 0; i < STAGE_COUNT; i++) {
      const count = bDeaths[`stage_${i}`] || 0;
      const isMax = bMax > 0 && count === bMax;
      html += `<div>${i + 1}단계: ${count}회${isMax ? ' 🔥' : ''}</div>`;
    }

    // 🚦 신호등 게임 통계
    const sFunnel = signalFunnelDoc.exists ? signalFunnelDoc.data() : {};
    const sDeaths = signalDeathsDoc.exists ? signalDeathsDoc.data() : {};
    const sStarts = sFunnel.gameStarts || 0;
    const sClears = sFunnel.gameClears || 0;
    const sRate = sStarts > 0 ? ((sClears / sStarts) * 100).toFixed(1) : '0.0';

    html += `<p style="margin-top:10px; color:#ffe66d;"><b>🚦 눈치 신호등 게임</b></p>`;
    html += `<p>시작 ${sStarts}회 / 클리어 ${sClears}회 (${sRate}%)</p>`;
    let sMax = 0;
    for (let i = 0; i < 10; i++) sMax = Math.max(sMax, sDeaths[`bucket_${i}`] || 0);
    for (let i = 0; i < 10; i++) {
      const count = sDeaths[`bucket_${i}`] || 0;
      const isMax = sMax > 0 && count === sMax;
      html += `<div>${i * 10}~${(i + 1) * 10}% 구간: ${count}회${isMax ? ' 🔥' : ''}</div>`;
    }

    // 🍚 밥상 눈치싸움 통계
    const tFunnel = tableFunnelDoc.exists ? tableFunnelDoc.data() : {};
    const tDeaths = tableDeathsDoc.exists ? tableDeathsDoc.data() : {};
    const tStarts = tFunnel.gameStarts || 0;
    const tClears = tFunnel.gameClears || 0;
    const tRate = tStarts > 0 ? ((tClears / tStarts) * 100).toFixed(1) : '0.0';

    html += `<p style="margin-top:10px; color:#ffe66d;"><b>🍚 밥상 눈치싸움</b></p>`;
    html += `<p>시작 ${tStarts}회 / 클리어 ${tClears}회 (${tRate}%)</p>`;
    let tMax = 0;
    for (let i = 1; i <= TABLE_ROUNDS; i++) tMax = Math.max(tMax, tDeaths[`round_${i}`] || 0);
    for (let i = 1; i <= TABLE_ROUNDS; i++) {
      const count = tDeaths[`round_${i}`] || 0;
      const isMax = tMax > 0 && count === tMax;
      html += `<div>${i}라운드: ${count}회${isMax ? ' 🔥' : ''}</div>`;
    }

    content.innerHTML = html;
  } catch (err) {
    console.error(err);
    content.innerHTML = `네트워크가 느립니다. <span id="stats-retry-link" style="color:#4ecdc4; text-decoration:underline; cursor:pointer;">다시 시도</span>`;
    const retryLink = document.getElementById('stats-retry-link');
    if (retryLink) retryLink.addEventListener('click', () => showStatsView());
  }
}

function hideLeaderboardOverlay() {
  document.getElementById('leaderboard-overlay').classList.add('hidden');
}

async function submitScore(finalTime, collectionName = 'scores') {
  const nicknameInput = document.getElementById('lb-nickname');
  const status = document.getElementById('lb-status');
  const nickname = nicknameInput.value.trim();
  const submitBtn = document.getElementById('lb-submit-btn');

  if (!currentUid) {
    status.textContent = '로그인 준비 중입니다. 잠시 후 다시 시도해주세요.';
    return;
  }
  if (!nickname) {
    status.textContent = '닉네임을 입력해주세요.';
    return;
  }
  if (!isValidNickname(nickname)) {
    status.textContent = '닉네임은 한글/영문/숫자 10자 이내로 입력해주세요.';
    return;
  }

  status.textContent = '등록 중...';
  submitBtn.disabled = true;

  try {
    const docRef = db.collection(collectionName).doc(currentUid);
    const doc = await withTimeout(docRef.get({ source: 'server' }), 8000, '네트워크 응답이 너무 느립니다.');
    // 기존 문서의 time 값이 숫자가 아니거나 비정상이면 "기록 없음"으로 간주 (오탐 방지 방어코드)
    const existingTime = (doc.exists && typeof doc.data().time === 'number' && !isNaN(doc.data().time))
      ? doc.data().time
      : null;

    if (existingTime === null || finalTime < existingTime) {
      await withTimeout(docRef.set({
        nickname: nickname,
        time: finalTime,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }), 8000, '네트워크 응답이 너무 느립니다.');

      // 실제로 서버에 저장됐는지 다시 한번 읽어서 확인 (조용히 실패하는 경우를 잡아내기 위함)
      const verifyDoc = await withTimeout(docRef.get({ source: 'server' }), 8000, '네트워크 응답이 너무 느립니다.');
      if (verifyDoc.exists && verifyDoc.data().time === finalTime) {
        status.textContent = '등록 완료! (서버 확인됨)';
        setTimeout(() => showRankOnlyView(collectionName), 800);
      } else {
        status.textContent = '저장 시도는 했지만 서버에서 확인되지 않았습니다. 새로고침 후 다시 시도해주세요.';
      }
    } else {
      status.textContent = `이미 더 좋은 기록(${existingTime}초)이 있어요!`;
    }
  } catch (err) {
    console.error(err);

// 네트워크가 느리거나 응답이 없을 때 무한정 "불러오는 중..."에 멈춰있지 않도록,
// 일정 시간 넘게 응답이 없으면 포기하고 에러로 처리하는 타임아웃 헬퍼.
function withTimeout(promise, ms, timeoutMessage) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(timeoutMessage || '요청 시간이 초과되었습니다.')), ms))
  ]);
}

async function loadLeaderboard(collectionName = 'scores') {
  const list = document.getElementById('lb-rank-list');
  list.innerHTML = '<li>불러오는 중...</li>';
  try {
    const snapshot = await withTimeout(
      db.collection(collectionName).orderBy('time').limit(10).get({ source: 'server' }),
      8000,
      '네트워크 응답이 너무 느립니다.'
    );
    if (snapshot.empty) {
      list.innerHTML = '<li>아직 등록된 기록이 없습니다.</li>';
      return;
    }
    list.innerHTML = '';
    snapshot.forEach((doc) => {
      const data = doc.data();
      const li = document.createElement('li');
      li.textContent = `${data.nickname} - ${data.time}초`;
      if (doc.id === currentUid) li.classList.add('lb-me');
      list.appendChild(li);
    });
  } catch (err) {
    console.error(err);
    list.innerHTML = `<li>네트워크가 느립니다. <span id="lb-retry-link" style="color:#4ecdc4; text-decoration:underline; cursor:pointer;">다시 시도</span></li>`;
    const retryLink = document.getElementById('lb-retry-link');
    if (retryLink) {
      retryLink.addEventListener('click', () => loadLeaderboard(collectionName));
    }
  }
}

   실제 배포 시 Firestore 콘솔 > 규칙 탭에 아래 규칙도 함께 추가해주세요 (기존 scores 규칙 아래에 이어붙이면 됩니다):

     allow read: if true;

}

async function copyTextToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (err) {
    console.warn('clipboard API 실패, 대체 방식 시도:', err.message);
  }
  // 클립보드 API가 막혀있는 환경(구형 브라우저 등)을 위한 대체 방식
  try {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    return true;
  } catch (err) {
    console.error('공유 문구 복사 실패:', err);
    return false;
  }
}

/* ===================== 사운드 매니저 (Web Audio API로 직접 합성) ===================== */
class SoundManager {
  constructor() { this.ctx = null; }
  ensure() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  tone(freq, duration, type, gainVal, delay) {
    this.ensure();
    const t0 = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal || 0.15, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration);
  }
  jump() { this.tone(420, 0.1, 'square', 0.08); }
  land() { this.tone(520, 0.08, 'sine', 0.12); }
  fall() {
    this.ensure();
    const t0 = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, t0);
    osc.frequency.exponentialRampToValueAtTime(60, t0 + 0.45);
    gain.gain.setValueAtTime(0.15, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.45);
  }
  clear() {
    this.tone(523, 0.12, 'triangle', 0.12, 0);
    this.tone(659, 0.12, 'triangle', 0.12, 0.1);
    this.tone(784, 0.2, 'triangle', 0.14, 0.2);
  }
  gameover() {
    this.tone(300, 0.15, 'sawtooth', 0.1, 0);
    this.tone(220, 0.15, 'sawtooth', 0.1, 0.12);
    this.tone(150, 0.3, 'sawtooth', 0.12, 0.24);
  }
  click() { this.tone(700, 0.05, 'square', 0.06); }
}
const SFX = new SoundManager();

/* ===================== 배경음악 (BGM) - Web Audio API로 직접 작곡한 오리지널 루프 =====================
   외부 음원 파일을 쓰지 않고 코드로 직접 멜로디를 생성하기 때문에 저작권 문제가 없습니다.
   3가지 패턴 중 매 세션마다 랜덤으로 하나가 선택되어 반복 재생됩니다. */
const BGM_PATTERNS = [
  { name: 'A', bpm: 132, melody: [523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 392.00, 440.00], bassNote: 130.81 },
  { name: 'B', bpm: 144, melody: [392.00, 440.00, 523.25, 440.00, 392.00, 349.23, 329.63, 349.23], bassNote: 146.83 },
  { name: 'C', bpm: 118, melody: [440.00, 523.25, 587.33, 523.25, 440.00, 392.00, 440.00, 523.25], bassNote: 164.81 }
];

class BGMPlayer {
  constructor() {
    this.ctx = null;
    this.intervalId = null;
    this.playing = false;
    this.muted = false;
    this.pattern = null;
    this.stepIndex = 0;
  }
  ensureCtx() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  playNote(freq, dur, type, gainVal) {
    const t0 = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }
  tick(stepSec) {
    if (this.muted) { this.stepIndex++; return; }
    const freq = this.pattern.melody[this.stepIndex % this.pattern.melody.length];
    this.playNote(freq, stepSec * 0.85, 'triangle', 0.045);
    if (this.stepIndex % 4 === 0) {
      this.playNote(this.pattern.bassNote, stepSec * 3.6, 'sine', 0.05);
    }
    this.stepIndex++;
  }
  start() {
    if (this.playing) return;
    this.ensureCtx();
    this.playing = true;
    this.pattern = BGM_PATTERNS[Math.floor(Math.random() * BGM_PATTERNS.length)];
    this.stepIndex = 0;
    const stepMs = (60000 / this.pattern.bpm) / 2; // 8분음표 단위
    this.intervalId = setInterval(() => this.tick(stepMs / 1000), stepMs);
  }
  toggleMute() {
    this.muted = !this.muted;
    return this.muted;
  }
}
const BGM = new BGMPlayer();

// 브라우저 자동재생 정책 때문에, 사용자의 첫 클릭/키 입력이 있을 때 BGM을 시작합니다.

// "재생 시작"과 "음소거"가 동시에 실행되는 걸 막기 위해 버블링을 막고 여기서 직접 처리합니다.

function generateSafeArray() {
  safeArray = [];
  for (let i = 0; i < STAGE_COUNT; i++) {
    let next;
    if (safeArray.length >= 2 && safeArray[i - 1] === safeArray[i - 2]) {
      next = 1 - safeArray[i - 1];

      }
    });

    // 리스트 영역만 보이도록 마스크 처리 (뷰포트 밖 카드는 잘려서 안 보임)
    const maskShape = this.make.graphics();
    maskShape.fillRect(450 - cardWidth / 2 - 20, viewTop, cardWidth + 40, viewHeight);
    const mask = maskShape.createGeometryMask();
    listContainer.setMask(mask);

    // 드래그로 위아래 스크롤 (콘텐츠가 뷰포트보다 길어지면 자동으로 활성화됨)
    const contentHeight = GAME_LIST.length * (cardHeight + cardGap) - cardGap;
    const minY = Math.min(viewTop, viewTop + (viewHeight - contentHeight));
    const maxY = viewTop;
    this.hasDragged = false;
    let dragStartPointerY = 0;
    let dragStartContainerY = 0;

    // 카드가 뷰포트보다 길어져서 스크롤이 필요한 경우에만 "↓ 더 있어요" 힌트 표시
    // (안 그러면 사용자가 마지막 카드가 잘렸다고 오해하기 쉬움)
    let scrollHint = null;
    if (contentHeight > viewHeight) {
      scrollHint = this.add.text(450, viewBottom - 14, '▼ 아래로 끌어서 더 보기', {
        fontSize: '13px', color: '#ffe66d', fontStyle: 'bold'
      }).setOrigin(0.5).setDepth(5);
      this.tweens.add({
        targets: scrollHint, y: viewBottom - 6, alpha: { from: 1, to: 0.4 },
        duration: 650, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
    }

    this.input.on('pointerdown', (pointer) => {
      this.hasDragged = false;
      dragStartPointerY = pointer.y;
      dragStartContainerY = listContainer.y;
    });
    this.input.on('pointermove', (pointer) => {
      if (!pointer.isDown) return;
      const delta = pointer.y - dragStartPointerY;
      if (Math.abs(delta) > 14) this.hasDragged = true;
      if (contentHeight > viewHeight) {
        listContainer.y = Phaser.Math.Clamp(dragStartContainerY + delta, minY, maxY);
        // 끝까지 스크롤했으면 힌트 숨김
        if (scrollHint) scrollHint.setVisible(listContainer.y > minY + 5);
      }
    });
    // 데스크탑 마우스 휠 스크롤 지원
    this.input.on('wheel', (pointer, gameObjects, deltaX, deltaY) => {
      if (contentHeight <= viewHeight) return;
      listContainer.y = Phaser.Math.Clamp(listContainer.y - deltaY * 0.6, minY, maxY);
      if (scrollHint) scrollHint.setVisible(listContainer.y > minY + 5);
    });

    this.add.text(450, 505, '조작: ↑ / ↓ 방향키 (또는 화면 버튼) · 카드의 🏆 버튼으로 게임별 랭킹 확인', {
      fontSize: '12px', color: '#888888'
    }).setOrigin(0.5);

    // 운영자용 - 눈에 띄지 않게 작은 통계 링크
    const statsLink = this.add.text(880, 545, '📊 통계', { fontSize: '12px', color: '#555555' })
      .setOrigin(1, 1).setInteractive({ useHandCursor: true });
    statsLink.on('pointerdown', (pointer, lx, ly, event) => { event.stopPropagation(); SFX.click(); showStatsView(); });
  }
}

/* ===================== 메인 게임 씬 ===================== */
class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  init() {
    this.currentStage = 0;
    this.lives = 3;
    this.startTime = null;
    this.hasStarted = false; // 첫 조작이 있기 전까지는 타이머가 흐르지 않음
    this.isJumping = false;
    this.gameOver = false;
    this.brokenPlatforms = new Set();
  }

  create() {
    hideLeaderboardOverlay();
    generateSafeArray();
    this.cameras.main.fadeIn(200, 0, 0, 0);
    logGameStart();

    this.add.rectangle(0, 0, 900, 560, 0x2b2140).setOrigin(0);
    for (let i = 0; i < 40; i++) {
      this.add.circle(
        Phaser.Math.Between(0, 900), Phaser.Math.Between(0, 400),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.6)
      );
    }

    this.add.rectangle(0, GROUND_Y, 900, 80, 0x0f3460).setOrigin(0);
    this.add.rectangle(0, GROUND_Y, 900, 6, 0x16537e).setOrigin(0);

    this.add.rectangle(0, TOP_Y - 40, START_X, 260, 0x4a3b6b).setOrigin(0);
    this.add.text(START_X / 2, 40, '출발', { fontSize: '18px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);

    const finishX = START_X + STAGE_COUNT * STAGE_WIDTH;
    this.add.rectangle(finishX, TOP_Y - 40, 900 - finishX, 260, 0x4a3b6b).setOrigin(0);
    this.add.text(finishX + (900 - finishX) / 2, 40, '🏆 골인', { fontSize: '18px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(finishX + (900 - finishX) / 2, 150, '🍚', { fontSize: '40px' }).setOrigin(0.5);

    this.platformGraphics = this.add.graphics();
    this.platformMarks = this.add.container();
    this.drawPlatforms();

    this.player = this.add.text(START_X / 2, TOP_Y + (BOT_Y - TOP_Y) / 2, '🧍', { fontSize: '36px' }).setOrigin(0.5);
    this.playerBaseY = this.player.y;

    this.livesText = this.add.text(20, 20, '❤️'.repeat(this.lives), { fontSize: '22px' });
    this.stageText = this.add.text(20, 50, `단계: ${this.currentStage} / ${STAGE_COUNT}`, { fontSize: '18px', color: '#ffffff' });
    this.timerText = this.add.text(20, 78, '시간: 0.0s', { fontSize: '18px', color: '#ffffff' });
    this.hintText = this.add.text(450, 520, '↑ / ↓ 방향키로 다음 발판 선택!', { fontSize: '16px', color: '#cccccc' }).setOrigin(0.5);

    this.messageText = this.add.text(450, 280, '', { fontSize: '32px', color: '#ff6b6b', fontStyle: 'bold' })
      .setOrigin(0.5).setDepth(10);

    this.dangerBorder = this.add.graphics().setDepth(9);
    this.dangerBorder.lineStyle(10, 0xff0000, 1);
    this.dangerBorder.strokeRect(5, 5, 890, 550);
    this.dangerBorder.setVisible(false);
    this.dangerTween = null;

    this.input.keyboard.on('keydown-UP', () => this.tryJump(0));
    this.input.keyboard.on('keydown-DOWN', () => this.tryJump(1));

    this.createTouchButtons();
  }

  drawPlatforms() {
    this.platformGraphics.clear();
    this.platformMarks.removeAll(true);
    for (let i = 0; i < STAGE_COUNT; i++) {
      const x = START_X + i * STAGE_WIDTH + STAGE_WIDTH / 2;
      const topBroken = this.brokenPlatforms.has(`${i}-0`);
      this.platformGraphics.fillStyle(topBroken ? 0x5a3a2a : 0x8d6e63, 1);
      this.platformGraphics.fillRoundedRect(x - 32, TOP_Y - 22, 64, 44, 8);
      this.platformGraphics.lineStyle(3, 0x4e342e, 1);
      this.platformGraphics.strokeRoundedRect(x - 32, TOP_Y - 22, 64, 44, 8);

      const botBroken = this.brokenPlatforms.has(`${i}-1`);
      this.platformGraphics.fillStyle(botBroken ? 0x5a3a2a : 0x8d6e63, 1);
      this.platformGraphics.fillRoundedRect(x - 32, BOT_Y - 22, 64, 44, 8);
      this.platformGraphics.lineStyle(3, 0x4e342e, 1);
      this.platformGraphics.strokeRoundedRect(x - 32, BOT_Y - 22, 64, 44, 8);

      if (topBroken) this.platformMarks.add(this.add.text(x, TOP_Y, '💩', { fontSize: '22px' }).setOrigin(0.5));
      if (botBroken) this.platformMarks.add(this.add.text(x, BOT_Y, '💩', { fontSize: '22px' }).setOrigin(0.5));
    }
  }

  createTouchButtons() {
    const btnUp = this.add.rectangle(800, 460, 80, 50, 0x4ecdc4, 0.9).setInteractive();
    this.add.text(800, 460, '▲ 위', { fontSize: '16px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
    btnUp.on('pointerdown', () => this.tryJump(0));

    const btnDown = this.add.rectangle(800, 520, 80, 50, 0xff6b6b, 0.9).setInteractive();
    this.add.text(800, 520, '▼ 아래', { fontSize: '16px', color: '#330000', fontStyle: 'bold' }).setOrigin(0.5);
    btnDown.on('pointerdown', () => this.tryJump(1));
  }

  tryJump(side) {
    if (this.isJumping || this.gameOver) return;
    if (this.currentStage >= STAGE_COUNT) return;
    if (!this.hasStarted) {
      this.hasStarted = true;
      this.startTime = Date.now(); // 첫 조작이 들어온 이 순간이 진짜 게임 시작 시점
    }
    SFX.jump();
    this.isJumping = true;
    const stageIdx = this.currentStage;
    const targetX = START_X + stageIdx * STAGE_WIDTH + STAGE_WIDTH / 2;
    const targetY = side === 0 ? TOP_Y : BOT_Y;
    const isSafe = safeArray[stageIdx] === side;

    this.tweens.add({
      targets: this.player, x: targetX, y: targetY - 30, duration: 220, ease: 'Quad.easeOut',
      onComplete: () => {
        if (isSafe) this.onSafeLand(targetX, targetY, stageIdx);
        else this.onFall(targetX, targetY, stageIdx, side);
      }
    });
  }

  onSafeLand(x, y, stageIdx) {
    this.tweens.add({
      targets: this.player, y: y, duration: 100, ease: 'Bounce.easeOut',
      onComplete: () => {
        SFX.land();
        this.burstParticles(x, y, 0x4ecdc4, 8);
        this.isJumping = false;
        this.currentStage++;
        this.stageText.setText(`단계: ${this.currentStage} / ${STAGE_COUNT}`);
        if (this.currentStage >= STAGE_COUNT) this.finishGame(true);
      }
    });
  }

  onFall(x, y, stageIdx, side) {
    SFX.fall();
    this.brokenPlatforms.add(`${stageIdx}-${side}`);
    this.drawPlatforms();
    this.burstParticles(x, y, 0x8b5a2b, 10);
    this.shakeCamera();
    this.showFloatText(x, y - 20, '으아아악-', '#ff4757');
    logStageDeath(stageIdx);

    this.tweens.add({
      targets: this.player, y: GROUND_Y + 60, angle: 360, duration: 500, ease: 'Quad.easeIn',
      onComplete: () => {
        this.lives--;
        this.livesText.setText('❤️'.repeat(Math.max(this.lives, 0)));
        this.updateDangerBorder();
        if (this.lives <= 0) { this.finishGame(false); return; }
        this.respawn();
      }
    });
  }

  respawn() {
    const respawnStage = this.currentStage;
    let respawnX, respawnY;
    if (respawnStage === 0) {
      respawnX = START_X / 2;
      respawnY = this.playerBaseY;
    } else {
      respawnX = START_X + (respawnStage - 1) * STAGE_WIDTH + STAGE_WIDTH / 2;
      respawnY = safeArray[respawnStage - 1] === 0 ? TOP_Y : BOT_Y;
    }
    this.player.setAngle(0);
    this.player.setPosition(respawnX, respawnY - 200);
    this.player.setAlpha(0.6);
    this.tweens.add({
      targets: this.player, y: respawnY, alpha: 1, duration: 300, ease: 'Bounce.easeOut',
      onComplete: () => { this.isJumping = false; }
    });
  }

  shakeCamera() { this.cameras.main.shake(180, 0.01); }

  updateDangerBorder() {
    if (this.lives === 1) {
      this.dangerBorder.setVisible(true);
      if (!this.dangerTween) {
        this.dangerTween = this.tweens.add({
          targets: this.dangerBorder, alpha: { from: 1, to: 0.15 }, duration: 500, yoyo: true, repeat: -1
        });
      }
    } else {
      this.dangerBorder.setVisible(false);
      if (this.dangerTween) {
        this.dangerTween.stop();
        this.dangerTween = null;
        this.dangerBorder.setAlpha(1);
      }
    }
  }

  burstParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(2, 4), color);
      const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      const dist = Phaser.Math.Between(20, 50);
      this.tweens.add({
        targets: p, x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist, alpha: 0,
        duration: 400, ease: 'Quad.easeOut', onComplete: () => p.destroy()
      });
    }
  }

  showFloatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, { fontSize: '20px', color: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
  }

  finishGame(success) {
    this.gameOver = true;
    if (this.dangerTween) {
      this.dangerTween.stop();
      this.dangerTween = null;
      this.dangerBorder.setVisible(false);
    }
    const finalTime = parseFloat(((Date.now() - this.startTime) / 1000).toFixed(1));

    if (success) {
      SFX.clear();
      this.messageText.setText('🎉 클리어! 🎉').setColor('#4ecdc4');
      this.showFloatText(450, 340, `기록: ${finalTime}초`, '#ffe66d');
      logGameClear();
    } else {
      SFX.gameover();
      this.messageText.setText('💀 목숨 소진 💀').setColor('#ff6b6b');
    }

    const restartBtn = this.add.rectangle(450, 400, 160, 46, 0xffe66d).setInteractive({ useHandCursor: true });
    this.add.text(450, 400, '다시 도전', { fontSize: '18px', color: '#333', fontStyle: 'bold' }).setOrigin(0.5);
    restartBtn.on('pointerover', () => restartBtn.setFillStyle(0xfff3a0));
    restartBtn.on('pointerout', () => restartBtn.setFillStyle(0xffe66d));
    restartBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });

    if (success) {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 기록 등록 / 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showSubmitView(finalTime); });
    } else {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showRankOnlyView('scores'); });
    }

    const titleBtn = this.add.rectangle(450, 504, 160, 36, 0x666666).setInteractive({ useHandCursor: true });
    this.add.text(450, 504, '게임 목록으로', { fontSize: '14px', color: '#fff' }).setOrigin(0.5);
    titleBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.start('HubScene'); });

    this.hintText.setVisible(false);
    const shareBtn = this.add.rectangle(450, 540, 220, 32, 0x8d6e63).setInteractive({ useHandCursor: true });
    const shareLabel = this.add.text(450, 540, '📋 결과 공유문구 복사', { fontSize: '13px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    shareBtn.on('pointerdown', async () => {
      SFX.click();
      const progressLabel = success ? '10/10단계 클리어' : `${this.currentStage}/10단계 탈락`;
      const shareText = buildShareText({
        gameLabel: '🌉 개똥 다리건너기',
        success, finalTime, progressLabel,
        failTitles: BRIDGE_FAIL_TITLES,
        successTitles: BRIDGE_SUCCESS_TITLES
      });
      const ok = await copyTextToClipboard(shareText);
      shareLabel.setText(ok ? '✅ 복사 완료! 카톡에 붙여넣기' : '복사 실패, 다시 시도해주세요');
      this.time.delayedCall(1800, () => shareLabel.setText('📋 결과 공유문구 복사'));
    });

    this.input.keyboard.once('keydown-SPACE', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });
  }

  update() {
    if (!this.gameOver && this.hasStarted) {
      const elapsed = (Date.now() - this.startTime) / 1000;
      this.timerText.setText(`시간: ${elapsed.toFixed(1)}s`);
    }
  }
}

/* ===================== 신호등 게임 씬 - 눈치 신호등 게임 ===================== */
const SIGNAL_TRACK_START_X = 130;
const SIGNAL_TRACK_END_X = 800;
const SIGNAL_TRACK_LENGTH = SIGNAL_TRACK_END_X - SIGNAL_TRACK_START_X;
const SIGNAL_TRACK_Y = 300;
const SIGNAL_SPEED = 160; // px/sec
const SIGNAL_RED_GRACE = 0.18; // 빨간불로 바뀐 직후 반응할 시간(초) - 너무 짧으면 억울하고, 길면 게임이 쉬워지므로 최소한만 부여

// 신호 지속시간 패턴 - 매번 이 중 하나를 랜덤으로 골라서 "짧게 끊기 / 보통 / 길게 방심 유도"를 섞습니다
const GREEN_PATTERNS = [[1.0, 1.6], [1.8, 2.6], [2.8, 3.8]];
const RED_PATTERNS = [[1.0, 1.6], [2.0, 3.0], [3.5, 5.0]];

function pickPatternDuration(patterns) {
  const range = patterns[Math.floor(Math.random() * patterns.length)];
  return Phaser.Math.FloatBetween(range[0], range[1]);
}

class SignalScene extends Phaser.Scene {
  constructor() { super('SignalScene'); }

  init() {
    this.progress = 0; // 0 ~ SIGNAL_TRACK_LENGTH
    this.lives = 3;
    this.startTime = null;
    this.hasStarted = false; // 첫 조작이 있기 전까지는 타이머가 흐르지 않음
    this.isMoving = false;
    this.gameOver = false;
    this.lightState = 'green'; // 'green' = 전진 가능, 'red' = 정지해야 함
    this.lightTimer = 0;
    this.redGraceRemaining = 0; // 빨간불 전환 직후 반응 유예시간
  }

  create() {
    hideLeaderboardOverlay();
    this.cameras.main.fadeIn(200, 0, 0, 0);
    logSignalStart();

    this.add.rectangle(0, 0, 900, 560, 0x1e2a3a).setOrigin(0);
    for (let i = 0; i < 40; i++) {
      this.add.circle(
        Phaser.Math.Between(0, 900), Phaser.Math.Between(0, 400),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.6)
      );
    }

    // 트랙 라인
    this.add.rectangle(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y, SIGNAL_TRACK_LENGTH, 6, 0x0f3460).setOrigin(0, 0.5);
    this.add.text(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y - 60, '출발', { fontSize: '16px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(SIGNAL_TRACK_END_X, SIGNAL_TRACK_Y - 60, '🏆 골인', { fontSize: '16px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(SIGNAL_TRACK_END_X, SIGNAL_TRACK_Y, '🍚', { fontSize: '32px' }).setOrigin(0.5);

    // 감시자 캐릭터 (트랙 끝쪽에 위치, 상태에 따라 이모지 변경)
    this.guard = this.add.text(SIGNAL_TRACK_END_X - 40, SIGNAL_TRACK_Y - 120, '🙈', { fontSize: '48px' }).setOrigin(0.5);
    this.lightLabel = this.add.text(450, 90, '', { fontSize: '26px', fontStyle: 'bold' }).setOrigin(0.5);

    // 플레이어 캐릭터
    this.player = this.add.text(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y, '🧍', { fontSize: '32px' }).setOrigin(0.5);

    // 진행도 바
    this.add.rectangle(450, 470, 620, 14, 0x333333).setOrigin(0.5).setStrokeStyle(2, 0x555555);
    this.progressBarFill = this.add.rectangle(140, 470, 4, 10, 0x4ecdc4).setOrigin(0, 0.5);

    this.livesText = this.add.text(20, 20, '❤️'.repeat(this.lives), { fontSize: '22px' });
    this.timerText = this.add.text(20, 50, '시간: 0.0s', { fontSize: '18px', color: '#ffffff' });
    this.hintText = this.add.text(450, 520, '초록불(🙈)일 때만 ↑키(또는 버튼)를 누르고 있으세요. 빨간불(😠)에 움직이면 탈락!', {
      fontSize: '14px', color: '#cccccc'
    }).setOrigin(0.5);

    this.messageText = this.add.text(450, 220, '', { fontSize: '32px', color: '#ff6b6b', fontStyle: 'bold' })
      .setOrigin(0.5).setDepth(10);

    this.dangerBorder = this.add.graphics().setDepth(9);
    this.dangerBorder.lineStyle(10, 0xff0000, 1);
    this.dangerBorder.strokeRect(5, 5, 890, 550);
    this.dangerBorder.setVisible(false);
    this.dangerTween = null;

    // 키보드 입력 (누르고 있는 동안 전진)
    this.upKey = this.input.keyboard.addKey('UP');

    // 모바일 터치 버튼
    const btnGo = this.add.rectangle(800, 490, 140, 56, 0x4ecdc4, 0.9).setInteractive();
    this.add.text(800, 490, '▲ 전진', { fontSize: '18px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
    btnGo.on('pointerdown', () => { this.touchHold = true; });
    btnGo.on('pointerup', () => { this.touchHold = false; });
    btnGo.on('pointerout', () => { this.touchHold = false; });
    this.touchHold = false;

    this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
  }

  setNextLightPhase(state, durationSec) {
    this.lightState = state;
    this.lightTimer = durationSec;
    if (state === 'green') {
      this.guard.setText('🙈');
      this.lightLabel.setText('🟢 GO');
      this.lightLabel.setColor('#4ecdc4');
    } else {
      this.guard.setText('😠');
      this.lightLabel.setText('🔴 STOP');
      this.lightLabel.setColor('#ff6b6b');
      this.redGraceRemaining = SIGNAL_RED_GRACE;
      SFX.click();
    }
  }

  update(time, delta) {
    if (this.gameOver) return;

    const dt = delta / 1000;

    this.isMoving = this.upKey.isDown || this.touchHold;

    if (this.isMoving && !this.hasStarted) {
      this.hasStarted = true;
      this.startTime = Date.now(); // 첫 전진 시도가 들어온 이 순간이 진짜 게임 시작 시점
    }

    if (this.hasStarted) {
      const elapsed = (Date.now() - this.startTime) / 1000;
      this.timerText.setText(`시간: ${elapsed.toFixed(1)}s`);
    }

    // 신호 타이머 갱신
    this.lightTimer -= dt;
    if (this.lightTimer <= 0) {
      if (this.lightState === 'green') {
        this.setNextLightPhase('red', pickPatternDuration(RED_PATTERNS));
      } else {
        this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
      }
    }

    if (this.redGraceRemaining > 0) this.redGraceRemaining -= dt;

    if (this.isMoving && this.lightState === 'red' && this.redGraceRemaining <= 0) {
      this.onCaught();
      return;
    }

    if (this.isMoving && this.lightState === 'green') {
      this.progress = Math.min(SIGNAL_TRACK_LENGTH, this.progress + SIGNAL_SPEED * dt);
      this.player.x = SIGNAL_TRACK_START_X + this.progress;
      this.progressBarFill.width = Math.max(4, (this.progress / SIGNAL_TRACK_LENGTH) * 620);

      if (this.progress >= SIGNAL_TRACK_LENGTH) {
        this.finishGame(true);
      }
    }
  }

  onCaught() {
    SFX.fall();
    this.shakeCamera();
    this.showFloatText(this.player.x, this.player.y - 30, '걸렸다!', '#ff4757');
    logSignalDeath(this.progress / SIGNAL_TRACK_LENGTH);

    this.lives--;
    this.livesText.setText('❤️'.repeat(Math.max(this.lives, 0)));
    this.updateDangerBorder();

    if (this.lives <= 0) {
      this.finishGame(false);
      return;
    }

    // 리스폰: 처음으로
    this.progress = 0;
    this.player.x = SIGNAL_TRACK_START_X;
    this.progressBarFill.width = 4;
    this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
  }

  shakeCamera() { this.cameras.main.shake(180, 0.01); }

  updateDangerBorder() {
    if (this.lives === 1) {
      this.dangerBorder.setVisible(true);
      if (!this.dangerTween) {
        this.dangerTween = this.tweens.add({
          targets: this.dangerBorder, alpha: { from: 1, to: 0.15 }, duration: 500, yoyo: true, repeat: -1
        });
      }
    } else {
      this.dangerBorder.setVisible(false);
      if (this.dangerTween) {
        this.dangerTween.stop();
        this.dangerTween = null;
        this.dangerBorder.setAlpha(1);
      }
    }
  }

  showFloatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, { fontSize: '20px', color: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
  }

  finishGame(success) {
    this.gameOver = true;
    if (this.dangerTween) {
      this.dangerTween.stop();
      this.dangerTween = null;
      this.dangerBorder.setVisible(false);
    }
    const finalTime = parseFloat(((Date.now() - this.startTime) / 1000).toFixed(1));

    if (success) {
      SFX.clear();
      this.messageText.setText('🎉 클리어! 🎉').setColor('#4ecdc4');
      this.showFloatText(450, 260, `기록: ${finalTime}초`, '#ffe66d');
      logSignalClear();
    } else {
      SFX.gameover();
      this.messageText.setText('💀 목숨 소진 💀').setColor('#ff6b6b');
    }

    const restartBtn = this.add.rectangle(450, 320, 160, 46, 0xffe66d).setInteractive({ useHandCursor: true });
    this.add.text(450, 320, '다시 도전', { fontSize: '18px', color: '#333', fontStyle: 'bold' }).setOrigin(0.5);
    restartBtn.on('pointerover', () => restartBtn.setFillStyle(0xfff3a0));
    restartBtn.on('pointerout', () => restartBtn.setFillStyle(0xffe66d));
    restartBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });

    if (success) {
      const rankBtn = this.add.rectangle(450, 376, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 376, '🏆 기록 등록 / 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showSubmitView(finalTime, 'scores_signal'); });
    } else {
      const rankBtn = this.add.rectangle(450, 376, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 376, '🏆 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showRankOnlyView('scores_signal'); });
    }

    const titleBtn = this.add.rectangle(450, 424, 160, 36, 0x666666).setInteractive({ useHandCursor: true });
    this.add.text(450, 424, '게임 목록으로', { fontSize: '14px', color: '#fff' }).setOrigin(0.5);
    titleBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.start('HubScene'); });

    this.hintText.setVisible(false);
    const shareBtn = this.add.rectangle(450, 465, 220, 34, 0x8d6e63).setInteractive({ useHandCursor: true });
    const shareLabel = this.add.text(450, 465, '📋 결과 공유문구 복사', { fontSize: '13px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    shareBtn.on('pointerdown', async () => {
      SFX.click();
      const progressPct = Math.round((this.progress / SIGNAL_TRACK_LENGTH) * 100);
      const progressLabel = success ? '골인 100%' : `${progressPct}% 지점 탈락`;
      const shareText = buildShareText({
        gameLabel: '🚦 눈치 신호등 게임',
        success, finalTime, progressLabel,
        failTitles: SIGNAL_FAIL_TITLES,
        successTitles: SIGNAL_SUCCESS_TITLES
      });
      const ok = await copyTextToClipboard(shareText);
      shareLabel.setText(ok ? '✅ 복사 완료! 카톡에 붙여넣기' : '복사 실패, 다시 시도해주세요');
      this.time.delayedCall(1800, () => shareLabel.setText('📋 결과 공유문구 복사'));
    });
  }
}

/* ===================== 밥상 눈치싸움 씬 - 정밀 타이밍 세이프존 탭 =====================
   메커닉: 젓가락(🥢)이 트랙을 왕복하고, 라운드마다 랜덤 위치에 세이프존(초록)이 생김.
   화면 탭 시 젓가락이 세이프존 안에 있으면 성공, 아니면 실패(목숨 -1).
   총 10라운드 클리어까지 걸린 시간이 랭킹 기록(scores_table, 낮을수록 우수 - 기존 스키마 재사용).
   실패해도 라운드는 유지하고 같은 라운드에서 재도전 (세이프존 위치만 새로 랜덤). */
const TABLE_ROUNDS = 10;
const TABLE_TRACK_START_X = 140;
const TABLE_TRACK_END_X = 760;
const TABLE_TRACK_Y = 300;

function getTableZoneWidth(round) {
  // round 1: 80px -> round 10: 19px (지수 곡선, 후반부 급격히 좁아짐)
  const t = (round - 1) / (TABLE_ROUNDS - 1);
  return Phaser.Math.Linear(80, 19, Math.pow(t, 0.7));
}
function getTableSpeed(round) {
  // round 1: 1200px/s -> round 10: 2550px/s (대표님 요청으로 극한 난이도 적용됨)
  const t = (round - 1) / (TABLE_ROUNDS - 1);
  return Phaser.Math.Linear(1200, 2550, Math.pow(t, 0.85));
}

// 성공할 때마다 랜덤으로 뜨는 '진지충 필살기 명언' (특정 작품 패러디 아닌 오리지널 병맛 대사)
const TABLE_HYPE_QUOTES = [
  '네 젓가락질은... 이미 죽어있다.',
  '밥알 한 톨의 각오도 없이 덤빈 것이냐.',
  '국물 튀는 소리조차 늦다.',
  '이 손목은 이미 계산을 끝냈다.',
  '반찬을 지킨다는 것, 그것은 각오다.',
  '너의 젓가락보다 내가 한 끗 빨랐을 뿐이다.',
  '실력이 아니다. 밥심이다.',
  '숟가락을 들 자격, 지금 증명했다.',
  '떨어지는 밥알조차 나를 기다려주지 않는다.',
  '완벽한 타이밍... 이것이 밥상 위의 도(道)다.'
];
function getTableHypeQuote() {
  return Phaser.Utils.Array.GetRandom(TABLE_HYPE_QUOTES);
}

class TableScene extends Phaser.Scene {
  constructor() { super('TableScene'); }

  init() {
    this.round = 1;
    this.lives = 3;
    this.startTime = null;
    this.hasStarted = false;
    this.gameOver = false;
    this.inputLocked = false;
  }

  create() {
    hideLeaderboardOverlay();
    this.cameras.main.fadeIn(200, 0, 0, 0);
    logTableStart();

    this.add.rectangle(0, 0, 900, 560, 0x2b2320).setOrigin(0);
    for (let i = 0; i < 40; i++) {
      this.add.circle(
        Phaser.Math.Between(0, 900), Phaser.Math.Between(0, 400),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.6)
      );
    }

    // 트랙(밥상 위 궤도)
    this.add.rectangle(TABLE_TRACK_START_X, TABLE_TRACK_Y, TABLE_TRACK_END_X - TABLE_TRACK_START_X, 30, 0x4a3b30)
      .setOrigin(0, 0.5).setStrokeStyle(3, 0x1a1210);

    this.zoneGfx = this.add.graphics();

    this.indicator = this.add.text(TABLE_TRACK_START_X, TABLE_TRACK_Y, '🥢', { fontSize: '40px' }).setOrigin(0.5);
    this.indicatorDir = 1;
    this.indicatorX = TABLE_TRACK_START_X;

    this.livesText = this.add.text(20, 20, '❤️'.repeat(this.lives), { fontSize: '22px' });
    this.roundText = this.add.text(20, 50, `라운드: ${this.round} / ${TABLE_ROUNDS}`, { fontSize: '18px', color: '#ffffff' });
    this.timerText = this.add.text(20, 78, '시간: 0.0s', { fontSize: '18px', color: '#ffffff' });
    this.hintText = this.add.text(450, 520, '화면을 탭해서 세이프존(초록)에 맞춰라! 타이밍이 전부다.', {
      fontSize: '15px', color: '#cccccc'
    }).setOrigin(0.5);

    this.messageText = this.add.text(450, 190, '', { fontSize: '32px', color: '#ff6b6b', fontStyle: 'bold' })
      .setOrigin(0.5).setDepth(10);
    this.quoteText = this.add.text(450, 200, '', {
      fontSize: '19px', color: '#ffd54a', fontStyle: 'italic', align: 'center', wordWrap: { width: 500 }
    }).setOrigin(0.5).setAlpha(0).setDepth(10);

    this.table = this.add.text(450, 440, '🍚🍲🥢', { fontSize: '52px' }).setOrigin(0.5);

    this.dangerBorder = this.add.graphics().setDepth(9);
    this.dangerBorder.lineStyle(10, 0xff0000, 1);
    this.dangerBorder.strokeRect(5, 5, 890, 550);
    this.dangerBorder.setVisible(false);
    this.dangerTween = null;

    this.setupTableRound();

    this.input.on('pointerdown', () => this.handleTableTap());
  }

  setupTableRound() {
    const zoneW = getTableZoneWidth(this.round);
    const margin = zoneW / 2 + 15;
    const zoneCenter = Phaser.Math.Between(TABLE_TRACK_START_X + margin, TABLE_TRACK_END_X - margin);
    this.zoneStart = zoneCenter - zoneW / 2;
    this.zoneEnd = zoneCenter + zoneW / 2;
    this.speed = getTableSpeed(this.round);
    this.indicatorX = TABLE_TRACK_START_X;
    this.indicatorDir = 1;
    this.drawTableZone();
    this.roundText.setText(`라운드: ${this.round} / ${TABLE_ROUNDS}`);
  }

  drawTableZone() {
    this.zoneGfx.clear();
    this.zoneGfx.fillStyle(0x4caf50, 0.85);
    this.zoneGfx.fillRect(this.zoneStart, TABLE_TRACK_Y - 15, this.zoneEnd - this.zoneStart, 30);
  }

  update(time, delta) {
    if (this.gameOver) return;
    const dt = delta / 1000;

    this.indicatorX += this.indicatorDir * this.speed * dt;
    if (this.indicatorX >= TABLE_TRACK_END_X) { this.indicatorX = TABLE_TRACK_END_X; this.indicatorDir = -1; }
    if (this.indicatorX <= TABLE_TRACK_START_X) { this.indicatorX = TABLE_TRACK_START_X; this.indicatorDir = 1; }
    this.indicator.x = this.indicatorX;

    if (this.lives === 1) {
      this.dangerBorder.setAlpha(0.5 + Math.sin(time / 120) * 0.5);
    }

    if (this.hasStarted) {
      const elapsed = (Date.now() - this.startTime) / 1000;
      this.timerText.setText(`시간: ${elapsed.toFixed(1)}s`);
    }
  }

  handleTableTap() {
    if (this.gameOver || this.inputLocked) return;

    if (!this.hasStarted) {
      this.hasStarted = true;
      this.startTime = Date.now(); // 첫 탭이 들어온 이 순간이 진짜 게임 시작 시점
    }

    const inZone = this.indicatorX >= this.zoneStart && this.indicatorX <= this.zoneEnd;
    if (inZone) this.onTableSuccess();
    else this.onTableFail();
  }

  onTableSuccess() {
    SFX.land();
    this.inputLocked = true;
    this.indicator.setScale(1.4);
    this.tweens.add({
      targets: this.indicator, scale: 1, duration: 150,
      onComplete: () => { this.inputLocked = false; }
    });
    this.burstTableParticles(this.indicatorX, TABLE_TRACK_Y, 0x4ecdc4, 8);

    this.quoteText.setText(`"${getTableHypeQuote()}"`);
    this.quoteText.setAlpha(1).setY(200);
    this.tweens.add({
      targets: this.quoteText, y: 180, alpha: { from: 1, to: 0 },
      duration: 900, delay: 250, ease: 'Cubic.easeOut'
    });

    if (this.round >= TABLE_ROUNDS) {
      this.finishTableGame(true);
    } else {
      this.round++;
      this.setupTableRound();
    }
  }

  onTableFail() {
    SFX.fall();
    this.shakeCamera();
    this.showTableFloatText(this.indicatorX, TABLE_TRACK_Y - 30, '헛손질!', '#ff4757');
    logTableDeath(this.round);

    this.inputLocked = true;
    this.tweens.add({
      targets: this.table, angle: { from: 0, to: -25 }, y: '-=20',
      duration: 90, yoyo: true, repeat: 2,
      onComplete: () => { this.table.setAngle(0); this.inputLocked = false; }
    });

    this.lives--;
    this.livesText.setText('❤️'.repeat(Math.max(this.lives, 0)));
    this.updateTableDangerBorder();

    if (this.lives <= 0) {
      this.finishTableGame(false);
    } else {
      // 목숨이 남아있으면 같은 라운드에서 재도전 (세이프존 위치만 새로 랜덤)
      this.setupTableRound();
    }
  }

  shakeCamera() { this.cameras.main.shake(180, 0.01); }

  updateTableDangerBorder() {
    if (this.lives === 1) {
      this.dangerBorder.setVisible(true);
      if (!this.dangerTween) {
        this.dangerTween = this.tweens.add({
          targets: this.dangerBorder, alpha: { from: 1, to: 0.15 }, duration: 500, yoyo: true, repeat: -1
        });
      }
    } else {
      this.dangerBorder.setVisible(false);
      if (this.dangerTween) {
        this.dangerTween.stop();
        this.dangerTween = null;
        this.dangerBorder.setAlpha(1);
      }
    }
  }

  burstTableParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(2, 4), color);
      const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      const dist = Phaser.Math.Between(20, 50);
      this.tweens.add({
        targets: p, x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist, alpha: 0,
        duration: 400, ease: 'Quad.easeOut', onComplete: () => p.destroy()
      });
    }
  }

  showTableFloatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, { fontSize: '20px', color: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
  }

  finishTableGame(success) {
    this.gameOver = true;
    this.table.setVisible(false);
    this.quoteText.setVisible(false);
    if (this.dangerTween) {
      this.dangerTween.stop();
      this.dangerTween = null;
      this.dangerBorder.setVisible(false);
    }
    const finalTime = parseFloat(((Date.now() - this.startTime) / 1000).toFixed(1));

    if (success) {
      SFX.clear();
      this.messageText.setText('🎉 클리어! 🎉').setColor('#4ecdc4');
      this.showTableFloatText(450, 340, `기록: ${finalTime}초`, '#ffe66d');
      logTableClear();
    } else {
      SFX.gameover();
      this.messageText.setText('💀 목숨 소진 💀').setColor('#ff6b6b');
    }

    const restartBtn = this.add.rectangle(450, 400, 160, 46, 0xffe66d).setInteractive({ useHandCursor: true });
    this.add.text(450, 400, '다시 도전', { fontSize: '18px', color: '#333', fontStyle: 'bold' }).setOrigin(0.5);
    restartBtn.on('pointerover', () => restartBtn.setFillStyle(0xfff3a0));
    restartBtn.on('pointerout', () => restartBtn.setFillStyle(0xffe66d));
    restartBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });

    if (success) {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 기록 등록 / 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showSubmitView(finalTime, 'scores_table'); });
    } else {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showRankOnlyView('scores_table'); });
    }

    const titleBtn = this.add.rectangle(450, 504, 160, 36, 0x666666).setInteractive({ useHandCursor: true });
    this.add.text(450, 504, '게임 목록으로', { fontSize: '14px', color: '#fff' }).setOrigin(0.5);
    titleBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.start('HubScene'); });

    this.hintText.setVisible(false);
    const shareBtn = this.add.rectangle(450, 540, 220, 32, 0x8d6e63).setInteractive({ useHandCursor: true });
    const shareLabel = this.add.text(450, 540, '📋 결과 공유문구 복사', { fontSize: '13px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    shareBtn.on('pointerdown', async () => {
      SFX.click();
      const progressLabel = success ? '10/10라운드 클리어' : `${this.round}/10라운드 탈락`;
      const shareText = buildShareText({
        gameLabel: '🍚 밥상 눈치싸움',
        success, finalTime, progressLabel,
        failTitles: TABLE_FAIL_TITLES,
        successTitles: TABLE_SUCCESS_TITLES
      });
      const ok = await copyTextToClipboard(shareText);
      shareLabel.setText(ok ? '✅ 복사 완료! 카톡에 붙여넣기' : '복사 실패, 다시 시도해주세요');
      this.time.delayedCall(1800, () => shareLabel.setText('📋 결과 공유문구 복사'));
    });
  }
}

  type: Phaser.AUTO,
  width: 900,
  height: 560,

  backgroundColor: '#1a1a2e',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [HubScene, MainScene, SignalScene, TableScene]
};

new Phaser.Game(config);
