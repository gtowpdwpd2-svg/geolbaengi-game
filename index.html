<script>

/* ===================== Firebase 초기화 ===================== */

/* ===================== 랭킹판 로직 =====================
   구조: 게임별로 별도 컬렉션(scores, scores_signal 등) 사용, 문서 ID = 유저의 익명 uid.
   -> 유저 1명당 게임별 기록 1개만 존재하고, 더 빠른 기록일 때만 갱신 가능.
   -> 이 구조 자체가 "같은 계정으로 점수 도배"를 원천 차단합니다.
   새 게임을 추가할 때마다 Firestore 콘솔 > 규칙 탭에 아래 패턴을 그대로 복사해서
   컬렉션 이름만 바꿔 추가해주세요 (기존 규칙 블록들 사이에 이어붙이면 됩니다):

   match /{collectionName}/{uid} {
     allow read: if true;
     allow create: if request.auth != null
                   && request.auth.uid == uid
                   && request.resource.data.time is number
                   && request.resource.data.time >= 3
                   && request.resource.data.time <= 300
                   && request.resource.data.nickname is string
                   && request.resource.data.nickname.size() > 0
                   && request.resource.data.nickname.size() <= 10;
     allow update: if request.auth != null
                   && request.auth.uid == uid
                   && request.resource.data.time is number
                   && request.resource.data.time >= 3
                   && request.resource.data.time <= 300
                   && request.resource.data.time < resource.data.time
                   && request.resource.data.nickname is string
                   && request.resource.data.nickname.size() > 0
                   && request.resource.data.nickname.size() <= 10;
     allow delete: if false;
   }

   (collectionName 자리에 실제로는 scores, scores_signal 처럼 구체적인 이름을 넣어야 합니다.
    Firestore 규칙은 컬렉션 이름에 와일드카드를 쓸 수 없어서, 게임이 늘어날 때마다
    이 블록을 통째로 복사해서 컬렉션 이름만 바꿔 추가해주시면 됩니다.)
*/

// 게임별 표시 이름 (랭킹판 제목에 사용)
const LEADERBOARD_LABELS = {
  scores: '🌉 개똥 다리건너기',
  scores_signal: '🚦 눈치 신호등 게임'
};

// 현재 열려있는 랭킹판이 어떤 게임 것인지 기억 (건너뛰기/닫기 버튼에서 참조)
let activeLeaderboardCollection = 'scores';

// 닉네임 형식 검증 (한글/영문/숫자만 허용, 1~10자)
// 참고: 이건 형식 검증일 뿐 비속어 필터는 아닙니다.
// 실제 서비스 단계에서는 별도의 비속어 필터 라이브러리나 서버 검수를 추가하는 걸 권장합니다.
const NICKNAME_PATTERN = /^[가-힣a-zA-Z0-9\s]{1,10}$/;
function isValidNickname(name) {
  return NICKNAME_PATTERN.test(name.trim());
}

function showSubmitView(finalTime, collectionName = 'scores') {
  activeLeaderboardCollection = collectionName;
  const label = LEADERBOARD_LABELS[collectionName] || collectionName;
  document.getElementById('lb-time-display').textContent = `[${label}] 이번 기록: ${finalTime}초`;
  document.getElementById('lb-submit-view').classList.remove('hidden');
  document.getElementById('lb-rank-view').classList.add('hidden');
  document.getElementById('lb-stats-view').classList.add('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');
  document.getElementById('lb-status').textContent = '';
  document.getElementById('lb-nickname').value = '';
  document.getElementById('lb-submit-btn').onclick = () => submitScore(finalTime, collectionName);
  document.getElementById('lb-nickname').focus();
}

function showRankOnlyView(collectionName = activeLeaderboardCollection) {
  activeLeaderboardCollection = collectionName;
  const label = LEADERBOARD_LABELS[collectionName] || collectionName;
  document.getElementById('lb-rank-title').textContent = `🏆 ${label} TOP 10`;
  document.getElementById('lb-submit-view').classList.add('hidden');
  document.getElementById('lb-rank-view').classList.remove('hidden');
  document.getElementById('lb-stats-view').classList.add('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');
  loadLeaderboard(collectionName);
}

// 운영자용 플레이 데이터 확인 화면 (설문 없이 서버 로그로 확인)
async function showStatsView() {
  document.getElementById('lb-submit-view').classList.add('hidden');
  document.getElementById('lb-rank-view').classList.add('hidden');
  document.getElementById('lb-stats-view').classList.remove('hidden');
  document.getElementById('leaderboard-overlay').classList.remove('hidden');

  const content = document.getElementById('lb-stats-content');
  content.textContent = '불러오는 중...';

  try {
    const [bridgeFunnelDoc, bridgeDeathsDoc, signalFunnelDoc, signalDeathsDoc] = await Promise.all([
      db.collection('analytics').doc('funnel').get(),
      db.collection('analytics').doc('stage_deaths').get(),
      db.collection('analytics').doc('funnel_signal').get(),
      db.collection('analytics').doc('signal_deaths').get()
    ]);

    let html = '';

    // 🌉 다리건너기 통계
    const bFunnel = bridgeFunnelDoc.exists ? bridgeFunnelDoc.data() : {};
    const bDeaths = bridgeDeathsDoc.exists ? bridgeDeathsDoc.data() : {};
    const bStarts = bFunnel.gameStarts || 0;
    const bClears = bFunnel.gameClears || 0;
    const bRate = bStarts > 0 ? ((bClears / bStarts) * 100).toFixed(1) : '0.0';

    html += `<p style="color:#ffe66d;"><b>🌉 개똥 다리건너기</b></p>`;
    html += `<p>시작 ${bStarts}회 / 클리어 ${bClears}회 (${bRate}%)</p>`;
    let bMax = 0;
    for (let i = 0; i < STAGE_COUNT; i++) bMax = Math.max(bMax, bDeaths[`stage_${i}`] || 0);
    for (let i = 0; i < STAGE_COUNT; i++) {
      const count = bDeaths[`stage_${i}`] || 0;
      const isMax = bMax > 0 && count === bMax;
      html += `<div>${i + 1}단계: ${count}회${isMax ? ' 🔥' : ''}</div>`;
    }

    // 🚦 신호등 게임 통계
    const sFunnel = signalFunnelDoc.exists ? signalFunnelDoc.data() : {};
    const sDeaths = signalDeathsDoc.exists ? signalDeathsDoc.data() : {};
    const sStarts = sFunnel.gameStarts || 0;
    const sClears = sFunnel.gameClears || 0;
    const sRate = sStarts > 0 ? ((sClears / sStarts) * 100).toFixed(1) : '0.0';

    html += `<p style="margin-top:10px; color:#ffe66d;"><b>🚦 눈치 신호등 게임</b></p>`;
    html += `<p>시작 ${sStarts}회 / 클리어 ${sClears}회 (${sRate}%)</p>`;
    let sMax = 0;
    for (let i = 0; i < 10; i++) sMax = Math.max(sMax, sDeaths[`bucket_${i}`] || 0);
    for (let i = 0; i < 10; i++) {
      const count = sDeaths[`bucket_${i}`] || 0;
      const isMax = sMax > 0 && count === sMax;
      html += `<div>${i * 10}~${(i + 1) * 10}% 구간: ${count}회${isMax ? ' 🔥' : ''}</div>`;
    }

    content.innerHTML = html;
  } catch (err) {
    console.error(err);
    content.textContent = '데이터를 불러오지 못했습니다.';
  }
}

function hideLeaderboardOverlay() {
  document.getElementById('leaderboard-overlay').classList.add('hidden');
}

async function submitScore(finalTime, collectionName = 'scores') {
  const nicknameInput = document.getElementById('lb-nickname');
  const status = document.getElementById('lb-status');
  const nickname = nicknameInput.value.trim();
  const submitBtn = document.getElementById('lb-submit-btn');

  if (!currentUid) {
    status.textContent = '로그인 준비 중입니다. 잠시 후 다시 시도해주세요.';
    return;
  }
  if (!nickname) {
    status.textContent = '닉네임을 입력해주세요.';
    return;
  }
  if (!isValidNickname(nickname)) {
    status.textContent = '닉네임은 한글/영문/숫자 10자 이내로 입력해주세요.';
    return;
  }

  status.textContent = '등록 중...';
  submitBtn.disabled = true;

  try {
    const docRef = db.collection(collectionName).doc(currentUid);
    const doc = await docRef.get();

    if (!doc.exists || finalTime < doc.data().time) {
      await docRef.set({
        nickname: nickname,
        time: finalTime,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      status.textContent = '등록 완료!';
    } else {
      status.textContent = `이미 더 좋은 기록(${doc.data().time}초)이 있어요!`;
    }
    setTimeout(() => showRankOnlyView(collectionName), 600);
  } catch (err) {
    console.error(err);
    status.textContent = '등록에 실패했습니다. 잠시 후 다시 시도해주세요.';
  } finally {
    submitBtn.disabled = false;
  }
}

async function loadLeaderboard(collectionName = 'scores') {
  const list = document.getElementById('lb-rank-list');
  list.innerHTML = '<li>불러오는 중...</li>';
  try {
    const snapshot = await db.collection(collectionName).orderBy('time').limit(10).get();
    if (snapshot.empty) {
      list.innerHTML = '<li>아직 등록된 기록이 없습니다.</li>';
      return;
    }
    list.innerHTML = '';
    snapshot.forEach((doc) => {
      const data = doc.data();
      const li = document.createElement('li');
      li.textContent = `${data.nickname} - ${data.time}초`;
      if (doc.id === currentUid) li.classList.add('lb-me');
      list.appendChild(li);
    });
  } catch (err) {
    console.error(err);
    list.innerHTML = '<li>랭킹을 불러오지 못했습니다.</li>';
  }
}

document.getElementById('lb-skip-btn').addEventListener('click', () => showRankOnlyView(activeLeaderboardCollection));
document.getElementById('lb-close-btn').addEventListener('click', () => hideLeaderboardOverlay());
document.getElementById('lb-stats-close-btn').addEventListener('click', () => hideLeaderboardOverlay());

/* ===================== 플레이 데이터 자동 로그 (알파테스트 분석용) =====================
   설문 없이 "몇 단계에서 가장 많이 죽는지", "시작 대비 클리어율"을 서버 데이터로 확인하기 위한 로그.
   문서 하나에 카운터만 누적시키는 구조라 읽을 때 문서 1개만 조회하면 통계가 바로 나옵니다.

   실제 배포 시 Firestore 콘솔 > 규칙 탭에 아래 규칙도 함께 추가해주세요 (기존 scores 규칙 아래에 이어붙이면 됩니다):

   match /analytics/{docId} {
     allow read: if true;
     allow write: if request.auth != null;
   }
*/
function logAnalytics(docId, field) {
  // 실패해도 게임 진행에 영향 없도록 실패를 조용히 무시 (fire-and-forget)
  db.collection('analytics').doc(docId).set(
    { [field]: firebase.firestore.FieldValue.increment(1) },
    { merge: true }
  ).catch((err) => console.warn('analytics log 실패(무시 가능):', err.message));
}

function logGameStart() {
  logAnalytics('funnel', 'gameStarts');
}
function logStageDeath(stageIdx) {
  logAnalytics('stage_deaths', `stage_${stageIdx}`);
}
function logGameClear() {
  logAnalytics('funnel', 'gameClears');
}

// 신호등 게임 전용 로그 (별도 문서 사용 - 다리건너기 데이터와 섞이지 않도록)
function logSignalStart() {
  logAnalytics('funnel_signal', 'gameStarts');
}
function logSignalDeath(progressRatio) {
  const bucket = Math.min(9, Math.floor(progressRatio * 10));
  logAnalytics('signal_deaths', `bucket_${bucket}`);
}
function logSignalClear() {
  logAnalytics('funnel_signal', 'gameClears');
}

/* ===================== 사운드 매니저 (Web Audio API로 직접 합성) ===================== */
class SoundManager {
  constructor() { this.ctx = null; }
  ensure() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  tone(freq, duration, type, gainVal, delay) {
    this.ensure();
    const t0 = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal || 0.15, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration);
  }
  jump() { this.tone(420, 0.1, 'square', 0.08); }
  land() { this.tone(520, 0.08, 'sine', 0.12); }
  fall() {
    this.ensure();
    const t0 = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, t0);
    osc.frequency.exponentialRampToValueAtTime(60, t0 + 0.45);
    gain.gain.setValueAtTime(0.15, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.45);
  }
  clear() {
    this.tone(523, 0.12, 'triangle', 0.12, 0);
    this.tone(659, 0.12, 'triangle', 0.12, 0.1);
    this.tone(784, 0.2, 'triangle', 0.14, 0.2);
  }
  gameover() {
    this.tone(300, 0.15, 'sawtooth', 0.1, 0);
    this.tone(220, 0.15, 'sawtooth', 0.1, 0.12);
    this.tone(150, 0.3, 'sawtooth', 0.12, 0.24);
  }
  click() { this.tone(700, 0.05, 'square', 0.06); }
}
const SFX = new SoundManager();

/* ===================== 배경음악 (BGM) - Web Audio API로 직접 작곡한 오리지널 루프 =====================
   외부 음원 파일을 쓰지 않고 코드로 직접 멜로디를 생성하기 때문에 저작권 문제가 없습니다.
   3가지 패턴 중 매 세션마다 랜덤으로 하나가 선택되어 반복 재생됩니다. */
const BGM_PATTERNS = [
  { name: 'A', bpm: 132, melody: [523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 392.00, 440.00], bassNote: 130.81 },
  { name: 'B', bpm: 144, melody: [392.00, 440.00, 523.25, 440.00, 392.00, 349.23, 329.63, 349.23], bassNote: 146.83 },
  { name: 'C', bpm: 118, melody: [440.00, 523.25, 587.33, 523.25, 440.00, 392.00, 440.00, 523.25], bassNote: 164.81 }
];

class BGMPlayer {
  constructor() {
    this.ctx = null;
    this.intervalId = null;
    this.playing = false;
    this.muted = false;
    this.pattern = null;
    this.stepIndex = 0;
  }
  ensureCtx() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  playNote(freq, dur, type, gainVal) {
    const t0 = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }
  tick(stepSec) {
    if (this.muted) { this.stepIndex++; return; }
    const freq = this.pattern.melody[this.stepIndex % this.pattern.melody.length];
    this.playNote(freq, stepSec * 0.85, 'triangle', 0.045);
    if (this.stepIndex % 4 === 0) {
      this.playNote(this.pattern.bassNote, stepSec * 3.6, 'sine', 0.05);
    }
    this.stepIndex++;
  }
  start() {
    if (this.playing) return;
    this.ensureCtx();
    this.playing = true;
    this.pattern = BGM_PATTERNS[Math.floor(Math.random() * BGM_PATTERNS.length)];
    this.stepIndex = 0;
    const stepMs = (60000 / this.pattern.bpm) / 2; // 8분음표 단위
    this.intervalId = setInterval(() => this.tick(stepMs / 1000), stepMs);
  }
  toggleMute() {
    this.muted = !this.muted;
    return this.muted;
  }
}
const BGM = new BGMPlayer();

// 브라우저 자동재생 정책 때문에, 사용자의 첫 클릭/키 입력이 있을 때 BGM을 시작합니다.

// "재생 시작"과 "음소거"가 동시에 실행되는 걸 막기 위해 버블링을 막고 여기서 직접 처리합니다.

/* ===================== 상수 ===================== */
const STAGE_COUNT = 10;
const STAGE_WIDTH = 90;
const START_X = 130;
const TOP_Y = 230;
const BOT_Y = 330;
const GROUND_Y = 480;

let safeArray = [];
function generateSafeArray() {
  safeArray = [];
  for (let i = 0; i < STAGE_COUNT; i++) {
    let next;
    if (safeArray.length >= 2 && safeArray[i - 1] === safeArray[i - 2]) {
      next = 1 - safeArray[i - 1];
    } else {
      next = Math.random() < 0.5 ? 0 : 1;
    }
    safeArray.push(next);
  }
}

class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  init() {
    this.currentStage = 0;
    this.lives = 3;
    this.startTime = 0;
    this.isJumping = false;
    this.gameOver = false;
    this.brokenPlatforms = new Set();
  }

  create() {
    hideLeaderboardOverlay();
    generateSafeArray();
    this.startTime = this.time.now;
    this.cameras.main.fadeIn(200, 0, 0, 0);
    logGameStart();

    this.add.rectangle(0, 0, 900, 560, 0x2b2140).setOrigin(0);
    for (let i = 0; i < 40; i++) {
      this.add.circle(
        Phaser.Math.Between(0, 900), Phaser.Math.Between(0, 400),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.6)
      );
    }

    this.add.rectangle(0, GROUND_Y, 900, 80, 0x0f3460).setOrigin(0);
    this.add.rectangle(0, GROUND_Y, 900, 6, 0x16537e).setOrigin(0);

    this.add.rectangle(0, TOP_Y - 40, START_X, 260, 0x4a3b6b).setOrigin(0);
    this.add.text(START_X / 2, 40, '출발', { fontSize: '18px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);

    const finishX = START_X + STAGE_COUNT * STAGE_WIDTH;
    this.add.rectangle(finishX, TOP_Y - 40, 900 - finishX, 260, 0x4a3b6b).setOrigin(0);
    this.add.text(finishX + (900 - finishX) / 2, 40, '🏆 골인', { fontSize: '18px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(finishX + (900 - finishX) / 2, 150, '🍚', { fontSize: '40px' }).setOrigin(0.5);

    this.platformGraphics = this.add.graphics();
    this.platformMarks = this.add.container();
    this.drawPlatforms();

    this.player = this.add.text(START_X / 2, TOP_Y + (BOT_Y - TOP_Y) / 2, '🧍', { fontSize: '36px' }).setOrigin(0.5);
    this.playerBaseY = this.player.y;

    this.livesText = this.add.text(20, 20, '❤️'.repeat(this.lives), { fontSize: '22px' });
    this.stageText = this.add.text(20, 50, `단계: ${this.currentStage} / ${STAGE_COUNT}`, { fontSize: '18px', color: '#ffffff' });
    this.timerText = this.add.text(20, 78, '시간: 0.0s', { fontSize: '18px', color: '#ffffff' });
    this.hintText = this.add.text(450, 520, '↑ / ↓ 방향키로 다음 발판 선택!', { fontSize: '16px', color: '#cccccc' }).setOrigin(0.5);

    this.messageText = this.add.text(450, 280, '', { fontSize: '32px', color: '#ff6b6b', fontStyle: 'bold' })
      .setOrigin(0.5).setDepth(10);

    this.dangerBorder = this.add.graphics().setDepth(9);
    this.dangerBorder.lineStyle(10, 0xff0000, 1);
    this.dangerBorder.strokeRect(5, 5, 890, 550);
    this.dangerBorder.setVisible(false);
    this.dangerTween = null;

    this.input.keyboard.on('keydown-UP', () => this.tryJump(0));
    this.input.keyboard.on('keydown-DOWN', () => this.tryJump(1));

    this.createTouchButtons();
  }

  drawPlatforms() {
    this.platformGraphics.clear();
    this.platformMarks.removeAll(true);
    for (let i = 0; i < STAGE_COUNT; i++) {
      const x = START_X + i * STAGE_WIDTH + STAGE_WIDTH / 2;
      const topBroken = this.brokenPlatforms.has(`${i}-0`);
      this.platformGraphics.fillStyle(topBroken ? 0x5a3a2a : 0x8d6e63, 1);
      this.platformGraphics.fillRoundedRect(x - 32, TOP_Y - 22, 64, 44, 8);
      this.platformGraphics.lineStyle(3, 0x4e342e, 1);
      this.platformGraphics.strokeRoundedRect(x - 32, TOP_Y - 22, 64, 44, 8);

      const botBroken = this.brokenPlatforms.has(`${i}-1`);
      this.platformGraphics.fillStyle(botBroken ? 0x5a3a2a : 0x8d6e63, 1);
      this.platformGraphics.fillRoundedRect(x - 32, BOT_Y - 22, 64, 44, 8);
      this.platformGraphics.lineStyle(3, 0x4e342e, 1);
      this.platformGraphics.strokeRoundedRect(x - 32, BOT_Y - 22, 64, 44, 8);

      if (topBroken) this.platformMarks.add(this.add.text(x, TOP_Y, '💩', { fontSize: '22px' }).setOrigin(0.5));
      if (botBroken) this.platformMarks.add(this.add.text(x, BOT_Y, '💩', { fontSize: '22px' }).setOrigin(0.5));
    }
  }

  createTouchButtons() {
    const btnUp = this.add.rectangle(800, 460, 80, 50, 0x4ecdc4, 0.9).setInteractive();
    this.add.text(800, 460, '▲ 위', { fontSize: '16px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
    btnUp.on('pointerdown', () => this.tryJump(0));

    const btnDown = this.add.rectangle(800, 520, 80, 50, 0xff6b6b, 0.9).setInteractive();
    this.add.text(800, 520, '▼ 아래', { fontSize: '16px', color: '#330000', fontStyle: 'bold' }).setOrigin(0.5);
    btnDown.on('pointerdown', () => this.tryJump(1));
  }

  tryJump(side) {
    if (this.isJumping || this.gameOver) return;
    if (this.currentStage >= STAGE_COUNT) return;
    SFX.jump();
    this.isJumping = true;
    const stageIdx = this.currentStage;
    const targetX = START_X + stageIdx * STAGE_WIDTH + STAGE_WIDTH / 2;
    const targetY = side === 0 ? TOP_Y : BOT_Y;
    const isSafe = safeArray[stageIdx] === side;

    this.tweens.add({
      targets: this.player, x: targetX, y: targetY - 30, duration: 220, ease: 'Quad.easeOut',
      onComplete: () => {
        if (isSafe) this.onSafeLand(targetX, targetY, stageIdx);
        else this.onFall(targetX, targetY, stageIdx, side);
      }
    });
  }

  onSafeLand(x, y, stageIdx) {
    this.tweens.add({
      targets: this.player, y: y, duration: 100, ease: 'Bounce.easeOut',
      onComplete: () => {
        SFX.land();
        this.burstParticles(x, y, 0x4ecdc4, 8);
        this.isJumping = false;
        this.currentStage++;
        this.stageText.setText(`단계: ${this.currentStage} / ${STAGE_COUNT}`);
        if (this.currentStage >= STAGE_COUNT) this.finishGame(true);
      }
    });
  }

  onFall(x, y, stageIdx, side) {
    SFX.fall();
    this.brokenPlatforms.add(`${stageIdx}-${side}`);
    this.drawPlatforms();
    this.burstParticles(x, y, 0x8b5a2b, 10);
    this.shakeCamera();
    this.showFloatText(x, y - 20, '으아아악-', '#ff4757');
    logStageDeath(stageIdx);

    this.tweens.add({
      targets: this.player, y: GROUND_Y + 60, angle: 360, duration: 500, ease: 'Quad.easeIn',
      onComplete: () => {
        this.lives--;
        this.livesText.setText('❤️'.repeat(Math.max(this.lives, 0)));
        this.updateDangerBorder();
        if (this.lives <= 0) { this.finishGame(false); return; }
        this.respawn();
      }
    });
  }

  respawn() {
    const respawnStage = this.currentStage;
    let respawnX, respawnY;
    if (respawnStage === 0) {
      respawnX = START_X / 2;
      respawnY = this.playerBaseY;
    } else {
      respawnX = START_X + (respawnStage - 1) * STAGE_WIDTH + STAGE_WIDTH / 2;
      respawnY = safeArray[respawnStage - 1] === 0 ? TOP_Y : BOT_Y;
    }
    this.player.setAngle(0);
    this.player.setPosition(respawnX, respawnY - 200);
    this.player.setAlpha(0.6);
    this.tweens.add({
      targets: this.player, y: respawnY, alpha: 1, duration: 300, ease: 'Bounce.easeOut',
      onComplete: () => { this.isJumping = false; }
    });
  }

  shakeCamera() { this.cameras.main.shake(180, 0.01); }

  updateDangerBorder() {
    if (this.lives === 1) {
      this.dangerBorder.setVisible(true);
      if (!this.dangerTween) {
        this.dangerTween = this.tweens.add({
          targets: this.dangerBorder, alpha: { from: 1, to: 0.15 }, duration: 500, yoyo: true, repeat: -1
        });
      }
    } else {
      this.dangerBorder.setVisible(false);
      if (this.dangerTween) {
        this.dangerTween.stop();
        this.dangerTween = null;
        this.dangerBorder.setAlpha(1);
      }
    }
  }

  burstParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(2, 4), color);
      const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      const dist = Phaser.Math.Between(20, 50);
      this.tweens.add({
        targets: p, x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist, alpha: 0,
        duration: 400, ease: 'Quad.easeOut', onComplete: () => p.destroy()
      });
    }
  }

  showFloatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, { fontSize: '20px', color: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
  }

  finishGame(success) {
    this.gameOver = true;
    if (this.dangerTween) {
      this.dangerTween.stop();
      this.dangerTween = null;
      this.dangerBorder.setVisible(false);
    }
    const finalTime = parseFloat(((this.time.now - this.startTime) / 1000).toFixed(1));

    if (success) {
      SFX.clear();
      this.messageText.setText('🎉 클리어! 🎉').setColor('#4ecdc4');
      this.showFloatText(450, 340, `기록: ${finalTime}초`, '#ffe66d');
      logGameClear();
    } else {
      SFX.gameover();
      this.messageText.setText('💀 목숨 소진 💀').setColor('#ff6b6b');
    }

    const restartBtn = this.add.rectangle(450, 400, 160, 46, 0xffe66d).setInteractive({ useHandCursor: true });
    this.add.text(450, 400, '다시 도전', { fontSize: '18px', color: '#333', fontStyle: 'bold' }).setOrigin(0.5);
    restartBtn.on('pointerover', () => restartBtn.setFillStyle(0xfff3a0));
    restartBtn.on('pointerout', () => restartBtn.setFillStyle(0xffe66d));
    restartBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });

    if (success) {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 기록 등록 / 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showSubmitView(finalTime); });
    } else {
      const rankBtn = this.add.rectangle(450, 456, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 456, '🏆 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showRankOnlyView('scores'); });
    }

    const titleBtn = this.add.rectangle(450, 504, 160, 36, 0x666666).setInteractive({ useHandCursor: true });
    this.add.text(450, 504, '게임 목록으로', { fontSize: '14px', color: '#fff' }).setOrigin(0.5);
    titleBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.start('HubScene'); });

    this.input.keyboard.once('keydown-SPACE', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });
  }

  update() {
    if (!this.gameOver) {
      const elapsed = (this.time.now - this.startTime) / 1000;
      this.timerText.setText(`시간: ${elapsed.toFixed(1)}s`);
    }
  }
}

const SIGNAL_TRACK_Y = 300;

// 신호 지속시간 패턴 - 매번 이 중 하나를 랜덤으로 골라서 "짧게 끊기 / 보통 / 길게 방심 유도"를 섞습니다
const GREEN_PATTERNS = [[1.0, 1.6], [1.8, 2.6], [2.8, 3.8]];

function pickPatternDuration(patterns) {
  const range = patterns[Math.floor(Math.random() * patterns.length)];
  return Phaser.Math.FloatBetween(range[0], range[1]);
}

class SignalScene extends Phaser.Scene {
  constructor() { super('SignalScene'); }

  init() {
    this.progress = 0; // 0 ~ SIGNAL_TRACK_LENGTH
    this.lives = 3;
    this.startTime = 0;
    this.isMoving = false;
    this.gameOver = false;
    this.lightState = 'green'; // 'green' = 전진 가능, 'red' = 정지해야 함
    this.lightTimer = 0;
    this.redGraceRemaining = 0; // 빨간불 전환 직후 반응 유예시간
  }

  create() {
    hideLeaderboardOverlay();
    this.startTime = this.time.now;
    this.cameras.main.fadeIn(200, 0, 0, 0);
    logSignalStart();

    this.add.rectangle(0, 0, 900, 560, 0x1e2a3a).setOrigin(0);
    for (let i = 0; i < 40; i++) {
      this.add.circle(
        Phaser.Math.Between(0, 900), Phaser.Math.Between(0, 400),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.6)
      );
    }

    // 트랙 라인
    this.add.rectangle(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y, SIGNAL_TRACK_LENGTH, 6, 0x0f3460).setOrigin(0, 0.5);
    this.add.text(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y - 60, '출발', { fontSize: '16px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(SIGNAL_TRACK_END_X, SIGNAL_TRACK_Y - 60, '🏆 골인', { fontSize: '16px', color: '#ffe66d', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(SIGNAL_TRACK_END_X, SIGNAL_TRACK_Y, '🍚', { fontSize: '32px' }).setOrigin(0.5);

    // 감시자 캐릭터 (트랙 끝쪽에 위치, 상태에 따라 이모지 변경)
    this.guard = this.add.text(SIGNAL_TRACK_END_X - 40, SIGNAL_TRACK_Y - 120, '🙈', { fontSize: '48px' }).setOrigin(0.5);
    this.lightLabel = this.add.text(450, 90, '', { fontSize: '26px', fontStyle: 'bold' }).setOrigin(0.5);

    // 플레이어 캐릭터
    this.player = this.add.text(SIGNAL_TRACK_START_X, SIGNAL_TRACK_Y, '🧍', { fontSize: '32px' }).setOrigin(0.5);

    // 진행도 바
    this.add.rectangle(450, 470, 620, 14, 0x333333).setOrigin(0.5).setStrokeStyle(2, 0x555555);
    this.progressBarFill = this.add.rectangle(140, 470, 4, 10, 0x4ecdc4).setOrigin(0, 0.5);

    this.livesText = this.add.text(20, 20, '❤️'.repeat(this.lives), { fontSize: '22px' });
    this.timerText = this.add.text(20, 50, '시간: 0.0s', { fontSize: '18px', color: '#ffffff' });
    this.hintText = this.add.text(450, 520, '초록불(🙈)일 때만 ↑키(또는 버튼)를 누르고 있으세요. 빨간불(😠)에 움직이면 탈락!', {
      fontSize: '14px', color: '#cccccc'
    }).setOrigin(0.5);

    this.messageText = this.add.text(450, 220, '', { fontSize: '32px', color: '#ff6b6b', fontStyle: 'bold' })
      .setOrigin(0.5).setDepth(10);

    this.dangerBorder = this.add.graphics().setDepth(9);
    this.dangerBorder.lineStyle(10, 0xff0000, 1);
    this.dangerBorder.strokeRect(5, 5, 890, 550);
    this.dangerBorder.setVisible(false);
    this.dangerTween = null;

    // 키보드 입력 (누르고 있는 동안 전진)
    this.upKey = this.input.keyboard.addKey('UP');

    // 모바일 터치 버튼
    const btnGo = this.add.rectangle(800, 490, 140, 56, 0x4ecdc4, 0.9).setInteractive();
    this.add.text(800, 490, '▲ 전진', { fontSize: '18px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
    btnGo.on('pointerdown', () => { this.touchHold = true; });
    btnGo.on('pointerup', () => { this.touchHold = false; });
    btnGo.on('pointerout', () => { this.touchHold = false; });
    this.touchHold = false;

    this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
  }

  setNextLightPhase(state, durationSec) {
    this.lightState = state;
    this.lightTimer = durationSec;
    if (state === 'green') {
      this.guard.setText('🙈');
      this.lightLabel.setText('🟢 GO');
      this.lightLabel.setColor('#4ecdc4');
    } else {
      this.guard.setText('😠');
      this.lightLabel.setText('🔴 STOP');
      this.lightLabel.setColor('#ff6b6b');
      this.redGraceRemaining = SIGNAL_RED_GRACE;
      SFX.click();
    }
  }

  update(time, delta) {
    if (this.gameOver) return;

    const dt = delta / 1000;
    const elapsed = (this.time.now - this.startTime) / 1000;
    this.timerText.setText(`시간: ${elapsed.toFixed(1)}s`);

    // 신호 타이머 갱신
    this.lightTimer -= dt;
    if (this.lightTimer <= 0) {
      if (this.lightState === 'green') {
        this.setNextLightPhase('red', pickPatternDuration(RED_PATTERNS));
      } else {
        this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
      }
    }

    if (this.redGraceRemaining > 0) this.redGraceRemaining -= dt;

    this.isMoving = this.upKey.isDown || this.touchHold;

    if (this.isMoving && this.lightState === 'red' && this.redGraceRemaining <= 0) {
      this.onCaught();
      return;
    }

    if (this.isMoving && this.lightState === 'green') {
      this.progress = Math.min(SIGNAL_TRACK_LENGTH, this.progress + SIGNAL_SPEED * dt);
      this.player.x = SIGNAL_TRACK_START_X + this.progress;
      this.progressBarFill.width = Math.max(4, (this.progress / SIGNAL_TRACK_LENGTH) * 620);

      if (this.progress >= SIGNAL_TRACK_LENGTH) {
        this.finishGame(true);
      }
    }
  }

  onCaught() {
    SFX.fall();
    this.shakeCamera();
    this.showFloatText(this.player.x, this.player.y - 30, '걸렸다!', '#ff4757');
    logSignalDeath(this.progress / SIGNAL_TRACK_LENGTH);

    this.lives--;
    this.livesText.setText('❤️'.repeat(Math.max(this.lives, 0)));
    this.updateDangerBorder();

    if (this.lives <= 0) {
      this.finishGame(false);
      return;
    }

    // 리스폰: 처음으로
    this.progress = 0;
    this.player.x = SIGNAL_TRACK_START_X;
    this.progressBarFill.width = 4;
    this.setNextLightPhase('green', pickPatternDuration(GREEN_PATTERNS));
  }

  shakeCamera() { this.cameras.main.shake(180, 0.01); }

  updateDangerBorder() {
    if (this.lives === 1) {
      this.dangerBorder.setVisible(true);
      if (!this.dangerTween) {
        this.dangerTween = this.tweens.add({
          targets: this.dangerBorder, alpha: { from: 1, to: 0.15 }, duration: 500, yoyo: true, repeat: -1
        });
      }
    } else {
      this.dangerBorder.setVisible(false);
      if (this.dangerTween) {
        this.dangerTween.stop();
        this.dangerTween = null;
        this.dangerBorder.setAlpha(1);
      }
    }
  }

  showFloatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, { fontSize: '20px', color: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
  }

  finishGame(success) {
    this.gameOver = true;
    if (this.dangerTween) {
      this.dangerTween.stop();
      this.dangerTween = null;
      this.dangerBorder.setVisible(false);
    }
    const finalTime = parseFloat(((this.time.now - this.startTime) / 1000).toFixed(1));

    if (success) {
      SFX.clear();
      this.messageText.setText('🎉 클리어! 🎉').setColor('#4ecdc4');
      this.showFloatText(450, 260, `기록: ${finalTime}초`, '#ffe66d');
      logSignalClear();
    } else {
      SFX.gameover();
      this.messageText.setText('💀 목숨 소진 💀').setColor('#ff6b6b');
    }

    const restartBtn = this.add.rectangle(450, 320, 160, 46, 0xffe66d).setInteractive({ useHandCursor: true });
    this.add.text(450, 320, '다시 도전', { fontSize: '18px', color: '#333', fontStyle: 'bold' }).setOrigin(0.5);
    restartBtn.on('pointerover', () => restartBtn.setFillStyle(0xfff3a0));
    restartBtn.on('pointerout', () => restartBtn.setFillStyle(0xffe66d));
    restartBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.restart(); });

    if (success) {
      const rankBtn = this.add.rectangle(450, 376, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 376, '🏆 기록 등록 / 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showSubmitView(finalTime, 'scores_signal'); });
    } else {
      const rankBtn = this.add.rectangle(450, 376, 220, 40, 0x4ecdc4).setInteractive({ useHandCursor: true });
      this.add.text(450, 376, '🏆 랭킹보기', { fontSize: '15px', color: '#003333', fontStyle: 'bold' }).setOrigin(0.5);
      rankBtn.on('pointerdown', () => { SFX.click(); showRankOnlyView('scores_signal'); });
    }

    const titleBtn = this.add.rectangle(450, 424, 160, 36, 0x666666).setInteractive({ useHandCursor: true });
    this.add.text(450, 424, '게임 목록으로', { fontSize: '14px', color: '#fff' }).setOrigin(0.5);
    titleBtn.on('pointerdown', () => { SFX.click(); hideLeaderboardOverlay(); this.scene.start('HubScene'); });
  }
}

const config = {
  type: Phaser.AUTO,
  width: 900,
  height: 560,
  parent: 'game-container',
  backgroundColor: '#1a1a2e',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [HubScene, MainScene, SignalScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
